name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux-gcc:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # gcc 15 : Fedora 43
        # gcc 14 : Fedora 41
        fedora_version: ["43", "41"]

    container: fedora:${{ matrix.fedora_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: dnf install -y gcc-c++ cmake ninja-build git curl zip unzip tar

      - name: Check GCC version
        run: |
          g++ --version
          g++ -dumpversion | grep -E "^(1[4-9]|[2-9][0-9])(\.|\$)" || { echo "ERROR: GCC 14+ required, found $(g++ -dumpversion)"; exit 1; }

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            ~/vcpkg
            build/vcpkg_installed
          key: ${{ runner.os }}-fedora-${{ matrix.fedora_version }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            ${{ runner.os }}-fedora-${{ matrix.fedora_version }}-vcpkg-

      - name: Install vcpkg
        run: |
          if [ ! -d ~/vcpkg ]; then
            git clone https://github.com/microsoft/vcpkg.git ~/vcpkg
            ~/vcpkg/bootstrap-vcpkg.sh
          fi

      - name: Configure
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$HOME/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build -V

  windows-msvc:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg
            build\vcpkg_installed
          key: ${{ runner.os }}-msvc-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            ${{ runner.os }}-msvc-vcpkg-

      - name: Setup vcpkg
        run: |
          if not exist C:\vcpkg (
            git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
            call C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
          )
        shell: cmd

      - name: Configure
        run: cmake -B build -S . -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -V -C Release

  linux-clang:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # clang 21 : Fedora 43
        # clang 20 : Fedora 42
        # clang 19 : Fedora 41
        fedora_version: ["43", "42", "41"]

    container: fedora:${{ matrix.fedora_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: dnf install -y clang cmake ninja-build git curl zip unzip tar

      - name: Check Clang version
        run: clang++ --version

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            ~/vcpkg
            build/vcpkg_installed
          key: ${{ runner.os }}-clang-${{ matrix.fedora_version }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            ${{ runner.os }}-clang-${{ matrix.fedora_version }}-vcpkg-

      - name: Install vcpkg
        run: |
          if [ ! -d ~/vcpkg ]; then
            git clone https://github.com/microsoft/vcpkg.git ~/vcpkg
            ~/vcpkg/bootstrap-vcpkg.sh
          fi

      - name: Configure
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$HOME/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build -V

  macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install cmake ninja

      - name: Check compiler version
        run: clang++ --version

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            ~/vcpkg
            build/vcpkg_installed
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-

      - name: Install vcpkg
        run: |
          if [ ! -d ~/vcpkg ]; then
            git clone https://github.com/microsoft/vcpkg.git ~/vcpkg
            ~/vcpkg/bootstrap-vcpkg.sh
          fi

      - name: Configure
        run: cmake -B build -S . -G Ninja -DCMAKE_TOOLCHAIN_FILE=$HOME/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build -V

  linux-sanitizers:
    runs-on: ubuntu-latest
    container: fedora:43

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: dnf install -y gcc-c++ libasan libubsan cmake ninja-build git curl zip unzip tar

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            ~/vcpkg
            build/vcpkg_installed
          key: ${{ runner.os }}-sanitizers-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            ${{ runner.os }}-sanitizers-vcpkg-

      - name: Install vcpkg
        run: |
          if [ ! -d ~/vcpkg ]; then
            git clone https://github.com/microsoft/vcpkg.git ~/vcpkg
            ~/vcpkg/bootstrap-vcpkg.sh
          fi

      - name: Configure (ASan + UBSan)
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$HOME/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer"

      - name: Build
        run: cmake --build build

      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --test-dir build -V

  emscripten:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install emsdk
        run: |
          git clone https://github.com/emscripten-core/emsdk.git /opt/emsdk
          /opt/emsdk/emsdk install latest
          /opt/emsdk/emsdk activate latest

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            ~/vcpkg
            build/vcpkg_installed
          key: ${{ runner.os }}-emscripten-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            ${{ runner.os }}-emscripten-vcpkg-

      - name: Install vcpkg
        run: |
          if [ ! -d ~/vcpkg ]; then
            git clone https://github.com/microsoft/vcpkg.git ~/vcpkg
            ~/vcpkg/bootstrap-vcpkg.sh
          fi

      - name: Configure
        run: |
          source /opt/emsdk/emsdk_env.sh
          cmake -B build -S . -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$HOME/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=wasm32-emscripten \
            -DVCPKG_CHAINLOAD_TOOLCHAIN_FILE=$EMSDK/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake \
            -DBUILD_CLI=OFF

      - name: Build
        run: |
          source /opt/emsdk/emsdk_env.sh
          cmake --build build

      - name: Test
        run: |
          source /opt/emsdk/emsdk_env.sh
          ctest --test-dir build -V

  linux-coverage:
    runs-on: ubuntu-latest
    container: fedora:43

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: dnf install -y gcc-c++ lcov cmake ninja-build git curl zip unzip tar

      - name: Restore vcpkg cache
        uses: actions/cache@v4
        with:
          path: |
            ~/vcpkg
            build/vcpkg_installed
          key: ${{ runner.os }}-coverage-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            ${{ runner.os }}-coverage-vcpkg-

      - name: Install vcpkg
        run: |
          if [ ! -d ~/vcpkg ]; then
            git clone https://github.com/microsoft/vcpkg.git ~/vcpkg
            ~/vcpkg/bootstrap-vcpkg.sh
          fi

      - name: Configure (coverage)
        run: |
          cmake -B build -S . -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=$HOME/vcpkg/scripts/buildsystems/vcpkg.cmake \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="--coverage -O0"

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build -V

      - name: Generate coverage report
        run: |
          lcov --capture --directory build --output-file coverage.info \
            --ignore-errors mismatch,gcov,source,negative
          lcov --extract coverage.info "$(pwd)/src/*" \
            --output-file coverage.info --ignore-errors unused
          lcov --list coverage.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-info
          path: coverage.info
